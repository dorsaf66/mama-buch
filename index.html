<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>كتاب الطهارة – سامية مجري</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1e1e1e;
      font-family: Arial, sans-serif;
      direction: rtl;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      text-align: center;
      padding: 15px;
      background: #111;
      font-size: 22px;
      font-weight: bold;
    }

    .content {
      flex: 1;
      width: 100%;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .fallback {
      text-align: center;
      padding: 20px;
    }

    a {
      color: #00bfff;
      font-size: 18px;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <!-- Titel -->
  <div class="header">
    كتاب الطهارة – سامية مجري
  </div>

  <!-- PDF -->
  <div class="content">
    <iframe src="livre-samia-mejri.pdf"></iframe>
  </div>

  <!-- Fallback falls iframe blockiert -->
  <div class="fallback">
    <p>إذا لم يفتح الكتاب:</p>
    <a href="livre-samia-mejri.pdf" target="_blank">
      📖 افتح الكتاب هنا
    </a>
  </div>

</body>
</html>
